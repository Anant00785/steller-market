name: Deploy Soroban Contract to Testnet
on:
  workflow_dispatch:
    inputs:
      initialize:
        description: 'Initialize contract after deploy?'
        default: 'yes'
        type: choice
        options: ['yes', 'no']
jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      contract_id: ${{ steps.deploy.outputs.CONTRACT_ID }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check secrets
        run: |
          [ -z "${{ secrets.ADMIN_SECRET_KEY }}" ] && echo "❌ ADMIN_SECRET_KEY not set!" && exit 1
          [ -z "${{ secrets.ADMIN_PUBLIC_KEY }}" ] && echo "❌ ADMIN_PUBLIC_KEY not set!" && exit 1
          echo "✅ Secrets OK"
          
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          stellar --version
          
      - uses: actions/cache@v4
        with:
          path: contracts/target
          key: contract-${{ hashFiles('contracts/**/*.rs') }}
          
      - name: Build contract
        working-directory: contracts/prediction_market
        run: stellar contract build
        
      - name: Add admin key
        env:
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
        run: echo "$ADMIN_SECRET_KEY" | stellar keys add admin --secret-key
        
      - name: Deploy
        id: deploy
        run: |
          ID=$(stellar contract deploy \
            --wasm contracts/target/wasm32v1-none/release/prediction_market.wasm \
            --source admin \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015")
          echo "CONTRACT_ID=$ID" >> $GITHUB_OUTPUT
          echo "✅ Contract ID: $ID"
          
      - name: Initialize
        if: ${{ github.event.inputs.initialize == 'yes' }}
        env:
          CID: ${{ steps.deploy.outputs.CONTRACT_ID }}
          ADMIN: ${{ secrets.ADMIN_PUBLIC_KEY }}
        run: |
          stellar contract invoke --id "$CID" --source admin \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            -- initialize --admin "$ADMIN" \
            --token CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
          echo "✅ Initialized!"
          
      - name: Summary
        if: always()
        run: |
          CID="${{ steps.deploy.outputs.CONTRACT_ID }}"
          echo "## CONTRACT_ID: $CID" >> $GITHUB_STEP_SUMMARY
