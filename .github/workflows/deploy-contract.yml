name: Deploy Soroban Contract to Testnet

on:
  workflow_dispatch:
    inputs:
      initialize:
        description: 'Initialize contract after deploy?'
        default: 'yes'
        type: choice
        options: ['yes', 'no']

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      contract_id: ${{ steps.deploy.outputs.CONTRACT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secrets are set
        run: |
          if [ -z "${{ secrets.ADMIN_SECRET_KEY }}" ]; then
            echo "❌ ERROR: ADMIN_SECRET_KEY secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.ADMIN_PUBLIC_KEY }}" ]; then
            echo "❌ ERROR: ADMIN_PUBLIC_KEY secret is not set!"
            exit 1
          fi
          echo "✅ Secrets are configured"

      - name: Install Rust stable + wasm32v1-none target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/stellar
          key: ${{ runner.os }}-stellar-cli-v25-cargo

      - name: Install Stellar CLI
        run: |
          if command -v stellar &> /dev/null; then
            echo "✅ Stellar CLI already cached: $(stellar --version)"
          else
            echo "Installing Stellar CLI via cargo..."
            cargo install --locked stellar-cli --features opt
          fi
          stellar --version

      - name: Cache contract build
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-contract-${{ hashFiles('contracts/**/*.rs', 'contracts/**/Cargo.toml') }}

      - name: Build contract
        working-directory: contracts/prediction_market
        run: |
          stellar contract build
          echo "✅ WASM built:"
          ls -lh ../target/wasm32v1-none/release/prediction_market.wasm

      - name: Register admin identity
        env:
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
        run: |
          echo "$ADMIN_SECRET_KEY" | stellar keys add admin --secret-key
          echo "✅ Admin identity registered"

      - name: Deploy contract to Testnet
        id: deploy
        env:
          ADMIN_PUBLIC_KEY: ${{ secrets.ADMIN_PUBLIC_KEY }}
        run: |
          echo "Deploying to Stellar Testnet..."
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/target/wasm32v1-none/release/prediction_market.wasm \
            --source admin \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015")

          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "=================================================="
